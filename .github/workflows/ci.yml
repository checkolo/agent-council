name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Generate sample cassettes
        run: uv run python scripts/generate_samples.py

      - name: Lint
        run: uv run ruff check quorum tests

      - name: Test
        run: uv run pytest tests/ -v

      - name: CLI smoke test
        run: |
          uv run quorum --help
          uv run quorum version
          uv run quorum self-test
          uv run quorum templates
          uv run quorum replay cassettes/samples/demo-auth.cassette

  build-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install and build
        run: |
          cd web && npm ci && npm run typecheck && npm run build
